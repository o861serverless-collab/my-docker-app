name: Deploy Stack

on:
  # push:
  #   branches: ["main"]
  workflow_dispatch:
env:
  RTDB_URL: ${{ secrets.RTDB_URL }}
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      # - name: Npm install
      #   run: |
      #     npm install -g @tltdh61/dotenvrtdb
      #     dotenvrtdb -e .env --pull -eUrl="$RTDB_URL" --writefilebase64=./cloudflared-credentials.json --var=CLOUDFLARED_TUNNEL_CREDENTIALS_BASE64
      # ----------------------------------------------------------------
      #  2. Pull .env + credentials từ Firebase RTDB
      # ----------------------------------------------------------------
      - name: Pull .env & credentials from RTDB
        run: |
          npm install -g @tltdh61/dotenvrtdb
          mkdir -p services/webssh/.ssh
          dotenvrtdb -e .env --pull -eUrl="$RTDB_URL" \
            --writefilebase64=./cloudflared-credentials.json \
            --var=CLOUDFLARED_TUNNEL_CREDENTIALS_BASE64 \
            --writefilebase64=./services/webssh/.ssh/id_rsa \
            --var=SSH_PULL_DATA_PRIVATE_KEY_BASE64 \
            --writefilebase64=./services/webssh/.ssh/known_hosts \
            --var=SSH_RUNNER_PUBLIC_KEY_BASE64
          chmod 600 services/webssh/.ssh/id_rsa || true

      - name: Verify SSH files & restart sshd
        run: |
          # Cho phép container đọc được (container root vẫn cần permission)
          chmod 644 ./services/webssh/.ssh/id_rsa
          echo "====== Check id_rsa ======"
          if [ -f ./services/webssh/.ssh/id_rsa ]; then
            # Fix trailing newline bị mất khi base64 decode
            echo "" >> ./services/webssh/.ssh/id_rsa
            echo "✅ id_rsa exists ($(wc -c < ./services/webssh/.ssh/id_rsa) bytes)"
            head -1 ./services/webssh/.ssh/id_rsa | grep -q 'BEGIN' \
              && echo "✅ valid private key format" \
              || { echo "❌ invalid format"; exit 1; }
          else
            echo "❌ id_rsa NOT found"; exit 1
          fi

          echo "====== Fix & check known_hosts ======"
          if [ -f ./services/webssh/.ssh/known_hosts ]; then
            # Nếu chưa có hostname prefix thì thêm vào
            if ! grep -q 'host.docker.internal' ./services/webssh/.ssh/known_hosts; then
              sed -i 's/^/host.docker.internal /' ./services/webssh/.ssh/known_hosts
              echo "✅ Fixed known_hosts — added hostname prefix"
            fi
            echo "✅ known_hosts:"
            cat ./services/webssh/.ssh/known_hosts | sed 's/^/  /'
          else
            echo "⚠️  known_hosts not found"
          fi

          echo "====== Add pubkey vào authorized_keys của runner ======"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keygen -y -f ./services/webssh/.ssh/id_rsa >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          echo "✅ Public key added"

          echo "====== Restart & verify sshd ======"
          sudo systemctl restart ssh
          sleep 1
          sudo systemctl is-active ssh \
            && echo "✅ sshd is running" \
            || { echo "❌ sshd failed to start"; exit 1; }

      - name: Check .env exists
        run: |
          if [ ! -f .env ]; then
            echo "ERROR: .env file not found. Create .env from .env.example and fill values."
            exit 1
          fi

      - name: Build & start services
        run: docker compose up -d --build --remove-orphans

      - name: Clean up unused images
        run: docker image prune -f
      - name: dotenvrtdb runner keepalive
        run: |
          dotenvrtdb runner keepalive

      - name: Collect docker runtime artifacts
        if: always()
        run: |
          set +e
          OUT_DIR="artifacts/docker-runtime"
          mkdir -p "$OUT_DIR/logs"

          docker compose ps -a > "$OUT_DIR/compose-ps.txt" 2>&1
          docker compose images > "$OUT_DIR/compose-images.txt" 2>&1
          docker compose logs --no-color > "$OUT_DIR/compose-logs.txt" 2>&1
          docker ps -a > "$OUT_DIR/docker-ps.txt" 2>&1
          docker images > "$OUT_DIR/docker-images.txt" 2>&1
          docker system df > "$OUT_DIR/docker-system-df.txt" 2>&1

          CONTAINERS=$(docker compose ps -q)
          if [ -n "$CONTAINERS" ]; then
            for c in $CONTAINERS; do
              docker inspect "$c" > "$OUT_DIR/inspect-$c.json" 2>&1
              docker logs "$c" > "$OUT_DIR/logs/$c.log" 2>&1
            done
          fi

          if [ -d logs ]; then
            cp -r logs "$OUT_DIR/app-logs"
          fi

      - name: Upload docker runtime artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: docker-runtime
          path: artifacts/docker-runtime
          if-no-files-found: warn
          retention-days: 7
