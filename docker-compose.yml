services:
  # ================================================================
  #  CADDY — Reverse proxy + SSL tự động
  #  caddy-docker-proxy: tự đọc Docker labels để tạo route
  # ================================================================
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_INGRESS_NETWORKS=app_net
    labels:
      caddy.email: "${CADDY_EMAIL}"
      caddy.auto_https: "off"
    networks: [app_net]
    restart: unless-stopped

  # ================================================================
  #  CLOUDFLARE TUNNEL — Expose ra Internet không cần mở port
  #  Toàn bộ traffic đổ về Caddy qua internal network
  # ================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared-credentials.json:/etc/cloudflared/credentials.json:ro
    networks: [app_net]
    restart: unless-stopped
    depends_on:
      - caddy

  # ================================================================
  #  TAILSCALE — VPN nội bộ cho team (tuỳ chọn)
  #  Team kết nối Tailscale VPN → truy cập Caddy qua IP tailscale
  # ================================================================
  tailscale:
    image: tailscale/tailscale:latest
    hostname: my-docker-app
    environment:
      TS_AUTHKEY: "${TAILSCALE_CLIENT_SECRET}"
      TS_USERSPACE: false
      TS_EXTRA_ARGS: --advertise-tags=${TAILSCALE_TAGS:-tag:container} --accept-dns=true --accept-routes
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host
    restart: unless-stopped

  # ================================================================
  #  NODE.JS APP — Dịch vụ chính Hello World
  # ================================================================
  app:
    build: ./services/app
    user: "0:0"
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "${APP_PORT:-3000}"
      LOG_DIR: "${LOG_DIR:-/app/logs}"
    volumes:
      - ./logs/app:/app/logs
    labels:
      - "caddy=http://${SUBDOMAIN_APP:-nodejs-my-docker-app}.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams ${APP_PORT:-3000}}}"
      - "caddy.basic_auth=/*"
      - "caddy.basic_auth.${CADDY_AUTH_USER}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped

  # ================================================================
  #  DOZZLE — Xem log realtime của tất cả container
  # ================================================================
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "caddy=http://${SUBDOMAIN_DOZZLE:-logs-my-docker-app}.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 8080}}"
      - "caddy.basic_auth=/*"
      - "caddy.basic_auth.${CADDY_AUTH_USER}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped

  # ================================================================
  #  FILEBROWSER — Duyệt và tải file log qua web
  # ================================================================
  filebrowser:
    image: filebrowser/filebrowser:latest
    command: --noauth --port 80 --root /srv --database /database/filebrowser.db

    volumes:
      - .:/srv
      - filebrowser_data:/database
    labels:
      - "caddy=http://${SUBDOMAIN_FILEBROWSER:-files-my-docker-app}.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 80}}"
      - "caddy.basic_auth=/*"
      - "caddy.basic_auth.${CADDY_AUTH_USER}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped

  # ================================================================
  #  WEBSSH — Terminal SSH vào host qua trình duyệt (ttyd)
  #  ⚠️  Nên bật basic_auth để tránh expose terminal ra public
  # ================================================================
  webssh:
    build: ./services/webssh # ← đổi image thành build
    command:
      - "ttyd"
      - "-W"
      - "ssh"
      - "-i"
      - "/root/.ssh/id_rsa"
      - "-o"
      - "StrictHostKeyChecking=no"
      - "-o"
      - "UserKnownHostsFile=/dev/null" # ← không ghi known_hosts
      - "-o"
      - "ConnectTimeout=10"
      - "-t"
      - "${CUR_WHOAMI:-runner}@host.docker.internal"
      - "cd ${CUR_WORK_DIR:-/home/runner/work} && exec $SHELL"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/webssh/.ssh:/root/.ssh:ro
    labels:
      - "caddy=http://${SUBDOMAIN_WEBSSH:-ttyd-my-docker-app}.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 7681}}"
      - "caddy.basic_auth=/*"
      - "caddy.basic_auth.${CADDY_AUTH_USER}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped

networks:
  app_net:
    name: app_net

volumes:
  caddy_data:
  caddy_config:
  portainer_data:
  tailscale_data:
  filebrowser_data:
