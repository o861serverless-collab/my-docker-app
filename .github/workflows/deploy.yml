name: Deploy Stack

on:
  # push:
  #   branches: ["main"]
  workflow_dispatch:
env:
  RTDB_URL: ${{ secrets.RTDB_URL }}
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pull .env & credentials from RTDB
        run: |
          npm install -g @tltdh61/dotenvrtdb
          mkdir -p services/webssh/.ssh
          dotenvrtdb -e .env --pull -eUrl="$RTDB_URL" \
            --writefilebase64=./cloudflared-credentials.json \
            --var=CLOUDFLARED_TUNNEL_CREDENTIALS_BASE64
          echo "CUR_WORK_DIR=$(pwd)" >> .env
          echo "CUR_WHOAMI=$(whoami)" >> .env

      # ----------------------------------------------------------------
      #  2b. Generate SSH keypair & setup authorized_keys
      # ----------------------------------------------------------------
      - name: Generate SSH keypair & setup sshd
        run: |
          mkdir -p services/webssh/.ssh

          # Tạo key mới mỗi lần deploy
          ssh-keygen -t ed25519 -f ./services/webssh/.ssh/id_rsa -N "" -q
          echo "✅ SSH keypair generated"

          # Add public key vào authorized_keys của runner
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          cat ./services/webssh/.ssh/id_rsa.pub >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          echo "✅ Public key added to authorized_keys"

          # Restart sshd
          sudo systemctl restart ssh
          sleep 1
          sudo systemctl is-active ssh \
            && echo "✅ sshd is running" \
            || { echo "❌ sshd failed"; exit 1; }

      - name: Fix sshd listen on all interfaces
        run: |
          sudo sed -i 's/^#ListenAddress 0.0.0.0/ListenAddress 0.0.0.0/' /etc/ssh/sshd_config
          # Hoặc nếu đang bị restrict:
          echo "ListenAddress 0.0.0.0" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh
          sudo ss -tlnp | grep 22

      - name: Build & start services
        run: docker compose up -d --build --remove-orphans

      - name: Clean up unused images
        run: docker image prune -f
      - name: dotenvrtdb runner keepalive
        run: |
          dotenvrtdb runner keepalive

      - name: Collect docker runtime artifacts
        if: always()
        run: |
          set +e
          OUT_DIR="artifacts/docker-runtime"
          mkdir -p "$OUT_DIR/logs"

          docker compose ps -a > "$OUT_DIR/compose-ps.txt" 2>&1
          docker compose images > "$OUT_DIR/compose-images.txt" 2>&1
          docker compose logs --no-color > "$OUT_DIR/compose-logs.txt" 2>&1
          docker ps -a > "$OUT_DIR/docker-ps.txt" 2>&1
          docker images > "$OUT_DIR/docker-images.txt" 2>&1
          docker system df > "$OUT_DIR/docker-system-df.txt" 2>&1

          CONTAINERS=$(docker compose ps -q)
          if [ -n "$CONTAINERS" ]; then
            for c in $CONTAINERS; do
              docker inspect "$c" > "$OUT_DIR/inspect-$c.json" 2>&1
              docker logs "$c" > "$OUT_DIR/logs/$c.log" 2>&1
            done
          fi

          if [ -d logs ]; then
            cp -r logs "$OUT_DIR/app-logs"
          fi

      - name: Upload docker runtime artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: docker-runtime
          path: artifacts/docker-runtime
          if-no-files-found: warn
          retention-days: 7
